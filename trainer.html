<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>강사 자료실 · 멈춤연습</title>
<meta name="description" content="멈춤연습 강사 자료 — 브랜드 핵심·강사 가이드·송&제스처·영상 스크립트·카드뉴스 10편">
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<style>
  :root {
    --bg: #f7f4ee;
    --ink: #1a1a1a;
    --muted: #5a5a5a;
    --brand: #1a1a1a;
    --shadow: 0 4px 18px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", -apple-system, "Noto Sans KR", sans-serif;
    font-size: 19px;
    line-height: 1.75;
    color: var(--ink);
    background: var(--bg);
  }
  header {
    padding: 16px 22px;
    background: white;
    border-bottom: 1px solid #e5e0d6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  header .logo { font-weight: 800; font-size: 18px; }
  header .logo small { color: var(--muted); font-size: 12px; margin-left: 4px; }
  header a {
    color: var(--ink);
    background: #fffbe6;
    border: 2px solid #ffb300;
    border-radius: 99px;
    padding: 6px 14px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
  }
  main { max-width: 720px; margin: 0 auto; padding: 30px 22px 80px; }
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 14px 18px;
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .nav a {
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    padding: 6px 12px;
    border-radius: 8px;
  }
  .nav a:hover { background: #fffbe6; }
  .nav .center { font-size: 14px; color: var(--muted); font-weight: 600; }
  .nav a.disabled { color: #ccc; pointer-events: none; }

  #content {
    background: white;
    border-radius: 18px;
    padding: 36px 30px;
    box-shadow: var(--shadow);
  }

  /* 마크다운 렌더 결과 스타일 */
  #content h1 {
    font-size: 32px;
    line-height: 1.25;
    margin: 0 0 20px;
    padding-bottom: 16px;
    border-bottom: 3px solid #1a1a1a;
  }
  #content h2 {
    font-size: 24px;
    margin: 36px 0 12px;
    line-height: 1.3;
  }
  #content h3 {
    font-size: 20px;
    margin: 24px 0 10px;
  }
  #content p, #content li { font-size: 18px; line-height: 1.8; }
  #content blockquote {
    border-left: 5px solid #ffb300;
    background: #fffbe6;
    padding: 14px 18px;
    margin: 18px 0;
    border-radius: 8px;
    font-weight: 600;
  }
  #content blockquote p { margin: 0; }
  #content table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: 16px;
  }
  #content th, #content td {
    border: 1px solid #e5e0d6;
    padding: 10px 12px;
    text-align: left;
  }
  #content th { background: #f7f4ee; font-weight: 700; }
  #content code {
    background: #f0ede5;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: "SF Mono", Menlo, monospace;
  }
  #content pre {
    background: #1a1a1a;
    color: #f7f4ee;
    padding: 16px 18px;
    border-radius: 10px;
    overflow-x: auto;
    line-height: 1.5;
    font-size: 15px;
  }
  #content pre code { background: transparent; color: inherit; padding: 0; }
  #content hr { border: 0; border-top: 1px solid #e5e0d6; margin: 30px 0; }
  #content ul, #content ol { padding-left: 26px; }
  #content li { margin: 6px 0; }
  #content a { color: #1F6FEB; }

  .loading { text-align: center; color: var(--muted); padding: 60px 0; }
  .error {
    background: #fdecea;
    border-left: 5px solid #c9302c;
    padding: 18px;
    border-radius: 10px;
    color: #c9302c;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 0;
    margin-top: 30px;
  }

  @media (max-width: 480px) {
    body { font-size: 17px; }
    main { padding: 20px 14px 60px; }
    #content { padding: 24px 18px; }
    #content h1 { font-size: 26px; }
    #content h2 { font-size: 21px; }
    #content p, #content li { font-size: 17px; }
    .nav { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/" style="text-decoration:none;color:inherit">👨‍🏫 강사 자료실 <small>stopcall.kr</small></a>
  <a href="/">← 메인</a>
</header>

<main>

  <div class="nav">
    <a id="prev" href="#">← 이전</a>
    <div class="center" id="center">강사 자료실</div>
    <a id="next" href="#">다음 →</a>
  </div>

  <article id="content">
    <div class="loading">불러오는 중…</div>
  </article>

  <div class="nav" style="margin-top:24px">
    <a id="prev2" href="#">← 이전</a>
    <a href="/library.html" style="background:#1a1a1a;color:white">📚 활동북 9장</a>
    <a id="next2" href="#">다음 →</a>
  </div>

  <footer>
    © 스마택트 · stopcall.kr · 강사 전용 자료 (어르신 화면 X)
  </footer>

</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const DOCS = {
    1: { file: 'docs/stop5_brand_core.md',       title: '브랜드 핵심',       slug: 'brand' },
    2: { file: 'docs/stop5_trainer_guide.md',    title: '강사 가이드',       slug: 'trainer' },
    3: { file: 'docs/stop5_song_and_gesture.md', title: '송 & 제스처',       slug: 'song' },
    4: { file: 'docs/stop5_video_scripts.md',    title: '영상 스크립트',     slug: 'video' },
    5: { file: 'docs/stop5_card_news_10.md',     title: '카드뉴스 10편',     slug: 'card' }
  };
  const SLUG_TO_NUM = Object.fromEntries(Object.entries(DOCS).map(([n, d]) => [d.slug, parseInt(n)]));
  const TOTAL = Object.keys(DOCS).length;

  const params = new URLSearchParams(location.search);
  const slug = params.get('doc') || 'brand';
  const num = SLUG_TO_NUM[slug] || 1;
  const meta = DOCS[num];
  const content = document.getElementById('content');

  if (!meta) {
    content.innerHTML = '<div class="error">존재하지 않는 자료입니다. <a href="/trainer.html">처음으로</a></div>';
  } else {
    document.title = `${meta.title} · 강사 자료실`;
    document.getElementById('center').textContent = `${meta.title} · ${num}/${TOTAL}`;

    const setNav = (id, targetNum) => {
      const a = document.getElementById(id);
      if (targetNum && DOCS[targetNum]) {
        a.href = `?doc=${DOCS[targetNum].slug}`;
      } else {
        a.classList.add('disabled');
        a.removeAttribute('href');
      }
    };
    setNav('prev', num - 1); setNav('prev2', num - 1);
    setNav('next', num + 1); setNav('next2', num + 1);

    fetch('/' + meta.file)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => { content.innerHTML = marked.parse(md); window.scrollTo(0,0); })
      .catch(e => {
        content.innerHTML = `<div class="error">불러오기 실패 (${e.message}).<br>경로: <code>${meta.file}</code></div>`;
      });
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
